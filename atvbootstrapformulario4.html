<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Bootstrap - Formulário 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main class="container">
        <h1>Formulário 4</h1>
        <h1>Novo Usuário</h1>
        <div class="row mt-3">
            <div class="col">
                <label class="form-label">Nome </label>
                <input class="form-control" placeholder="Informe o nome">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-4">
                <label class="form-label">CPF </label>
                <input class="form-control" placeholder="Informe o CPF">
            </div >
            <div class="col-6">
                <label class="form-label">Endereço </label>
                <input class="form-control" placeholder="Informe o endereço">
            </div >
            <div class="col-2">
                <label class="form-label">Nivel </label>
                <select class="form-select">
                    <option selected>---</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                </select>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-6">
                <label class="form-label">Email </label>
                <input class="form-control" placeholder="Informe o email">
            </div >
            <div class="col-4">
                <label class="form-label">Senha </label>
                <input class="form-control" placeholder="Informe a senha">
            </div >
            <div class="col-2">
                <label class="form-label">Status </label>
                <select class="form-select">
                    <option selected>---</option>
                    <option>Não sei</option>
                    <option>O que ?</option>
                    <option>??????</option>
                    <option>sei lá</option>
                    <option>desconheço</option>
                    <option>aaaaaa</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col text-end">
                <button class="btn btn-success mt-3">Enviar</button>
                <button class="btn btn-danger mt-3">Cancelar</button>
            </div>

        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
