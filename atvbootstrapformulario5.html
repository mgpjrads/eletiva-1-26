<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Bootstrap - Formulário 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-white">
     <h1>Formulário 5</h1>
    <main class="container">
        <div class="bg-light p-4 border rounded shadow-sm">
            <h2>Billing address</h2>
                <div class="row mt-3">
                    <div class="col-6">
                        <label class="form-label">First name </label>
                        <input class="form-control" >
                    </div >
                    <div class="col-6">
                        <label class="form-label">Last name </label>
                        <input class="form-control" >
                    </div >
                </div>

                <div class="row mt-3">
                    <div class="col">
                        <label class="form-label">Username </label>
                        <div class="input-group">
                            <span class="input-group-text">@</span>
                            <input class="form-control" placeholder=" username">
                        </div>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-12">
                        <label class="form-label">Email (optional) </label>
                        <input class="form-control" placeholder="you@exemple.com">
                    </div >
                </div>
                
                <div class="row mt-3">
                    <div class="col-12">
                        <label class="form-label">Address </label>
                        <input class="form-control" placeholder="1234 Main St">
                    </div >
                </div>

                <div class="row mt-3">
                    <div class="col-12">
                        <label class="form-label">Address 2 (optional) </label>
                        <input class="form-control" placeholder="Apartment or suite">
                    </div >
                </div>

            <div class="row mt-3">
                <div class="col-5">
                    <label class="form-label">Country </label>
                    <select class="form-select">
                        <option selected>Choose...</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                    </select>
                </div >
                <div class="col-4">
                    <label class="form-label">State </label>
                    <select class="form-select">
                        <option selected>Choose...</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                    </select>
                </div >
                <div class="col-3">
                    <label class="form-label">xip </label>
                    <input type="number" class="form-control" >
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
