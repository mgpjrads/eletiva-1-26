<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Bootstrap - Formulário 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h1 class="mb-5">Formulário 2</h1>
    <div class="row mt-3">
        <div class="col-1">
            <label for="codigo" class="form-label">Código</label>
            <input id="codigo" name="codigo" class="form-control" type="number" placeholder="32">
        </div>
        <div class="col-5">
            <label for="nome" class="form-label">Nome</label>
            <input id="nome" name="nome" class="form-control" type="text" placeholder="Nome completo do cliente">
        </div>
        <div class="col-4">
            <label for="email" class="form-label">E-mail</label>
            <input id="email" name="email" class="form-control" type="text" placeholder="cliente@dominio.com">
        </div>
        <div class="col-2">
            <label for="cpf" class="form-label">CPF</label>
            <input id="cpf" name="cpf" class="form-control" type="number" placeholder="Só números">
        </div>
    </div>
    <div class="row mt-3">
        <div class="col-2">
            <label for="celular" class="form-label">Nº Celular</label>
            <input id="celular" name="celular" class="form-control" type="number" placeholder="Nº do celular">
        </div>
        <div class="col-2">
            <label for="telefone" class="form-label"> Nº Telefone fixo</label>
            <input id="telefone" name="telefone" class="form-control" type="number" placeholder="Nº telefone">
        </div>
        <div class="col-2">
            <label for="cep" class="form-label">CEP</label>
            <input id="cep" name="cep" class="form-control" type="number" placeholder="ex: 88308070">
        </div>
        <div class="col-2">
            <label for="logradouro" class="form-label">Logradouro</label>
            <input id="logradouro" name="logradouro" class="form-control" type="text" placeholder="ex:Rua 1400">
        </div>
        <div class="col-1">
            <label for="numero" class="form-label">Nº</label>
            <input id="numero" name="numero" class="form-control" type="number" placeholder="Nº">
        </div>
        <div class="col-3">
            <label for="bairro" class="form-label">Bairro</label>
            <input id="bairro" name="bairro" class="form-control" type="text" placeholder="Bairro">
        </div>
    </div>
    <div class="row mt-3">
        <div class="col-3">
            <label for="cidade" class="form-label">Cidade</label>
            <input id="cidade" name="cidade" class="form-control" type="" placeholder="Cidade">
        </div>
        <div class="col-1">
            <label for="uf" class="form-label">UF</label>
            <input id="uf" name="uf" class="form-control" type="" placeholder="UF">
        </div>
        <div class="col-2">
            <label for="status" class="form-label" for="">Status</label>
            <select id="status" name="status" class="form-select" name="" id="">
                <option selected>Selecione</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
            </select>
        </div>
    </div>
    <div class="row">
            <div class="col text-end">
                <button class="btn btn-danger mt-3">Resetar</button>
                <button class="btn btn-success mt-3">Próximo</button>
            </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
