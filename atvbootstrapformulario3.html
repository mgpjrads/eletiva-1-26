<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Bootstrap - Formulário 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <div class="container justify-content-center">
        <h1>Formulário 3</h1>
        <h1 class="text-center">Sample Form</h1>
        <div class="row justify-content-center align-items-center mt-3">
            <div class="col-2">
                <label for="" class="col-form-label">Partner Name</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="text">
            </div>   
            <div class="col-2">
                <label for="" class="col-form-label">Partner Email ID</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="text">
            </div>
        </div>


        <div class="row justify-content-center align-items-center mt-3">
            <div class="col-2">
                <label for="" class="col-form-label">Partner Legal Name</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="text">
            </div>   
            <div class="col-2">
                <label for="" class="col-form-label">Partner mobile</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="text">
            </div>
        </div>

        <div class="row justify-content-center align-items-center mt-3">
            <div class="col-2">
                <label for="" class="col-form-label">Partner Address</label>
            </div>
            <div class="col-10">
                <input class="form-control form-control-sm" type="text">
            </div>
        </div> 
        
        <div class="row justify-content-center align-items-center mt-3">
            <div class="col-2">
                <label for="" class="col-form-label">Contract Start Date</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="date" placeholder="Date Start">
            </div>   
            <div class="col-2">
                <label for="" class="col-form-label">Contract Expiry Date</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="date" placeholder="Date end">
            </div>
        </div>

        <div class="row justify-content-center align-items-center mt-3">
            <div class="col-2">
                <label for="" class="col-form-label">Minimum Loan Amount</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="number">
            </div>   
            <div class="col-2">
                <label for="" class="col-form-label">Maximum Loan Amount</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="number">
            </div>
        </div>

        <div class="row justify-content-center align-items-center mt-3">
            <div class="col-2">
                <label for="" class="col-form-label">Interest Rate</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="number">
            </div>   
            <div class="col-2">
                <label for="" class="col-form-label">Deposit Amount</label>
            </div>
            <div class="col-4">
                <input class="form-control form-control-sm" type="number">
            </div>
        </div>

        <div class="text-center mt-4">
            <button class="btn btn-primary">Save</button>
        </div>



    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
